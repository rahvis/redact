name: workonward-read
title: WorkOnward Read
summary: A simple tool for redacting PDFs and images
description: |
  WorkOnward Read (based on open-source software by Björn Seipel, GPL-3.0) is a
  privacy-focused tool for redacting sensitive information in PDF
  documents and images. Users can import PDF documents, which are converted into
  images during the process. This conversion ensures that text cannot be copied
  or indexed without OCR, enhancing the security of your information.

  Key features:
  - Import PDF, PNG, and JPG files
  - Draw black or white redaction bars over sensitive content
  - Invisible PDF layers are not converted, preventing accidental leaks
  - High-quality and compressed export modes
  - Session persistence - continue where you left off
  - Password-protected PDF support
  - Command-line file opening support

adopt-info: workonward-read
license: GPL-3.0
grade: stable
confinement: strict
base: core24

contact: https://workonward.org
website: https://workonward.org
source-code: https://github.com/rahvis/redact
issues: https://github.com/rahvis/redact/issues

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]

plugs:
  shmem:
    interface: shared-memory
    private: true

apps:
  workonward-read:
    command: bin/launcher
    desktop: share/applications/workonward-read.desktop
    environment:
      FONTCONFIG_PATH: $SNAP/fonts
      FONTCONFIG_FILE: $SNAP/fonts/fonts.conf
      XDG_DATA_DIRS: $SNAP/usr/share:$XDG_DATA_DIRS
      GDK_SCALE: $GDK_SCALE
      GDK_DPI_SCALE: $GDK_DPI_SCALE
    plugs:
      - home
      - removable-media
      - x11
      - wayland
      - desktop
      - desktop-legacy
      - network
      - network-bind
      - shmem
      
parts:
  workonward-read:
    plugin: nil
    # Built from the LOCAL source tree (this checkout), not the upstream repo.
    source: .


    build-packages:
      - python3
      - python3-venv
      - python3-pip
      - python3-tk
      - tk
      - tcl
      - build-essential
      - libssl-dev
      - libffi-dev
      - pkg-config
      - libpython3.12

    stage-packages:
      - libx11-6
      - libxext6
      - libxrender1
      - libxcb1
      - libxau6
      - libxdmcp6
      - fontconfig
      - fonts-dejavu-core
      - fonts-noto-core

    override-build: |
      set -euo pipefail

      craftctl set version="$(sed -n 's/^__version__ *= *["'"'"']\([^"'"'"']*\)["'"'"'].*/\1/p' workonward_read/__init__.py)"
      craftctl default

      # Build Python app using PyInstaller
      VENV="$CRAFT_PART_BUILD/venv"
      python3 -m venv "$VENV"
      "$VENV/bin/python" -m pip install --upgrade pip setuptools wheel
      "$VENV/bin/python" -m pip install "pyinstaller>=5.0.0"
      "$VENV/bin/python" -m pip install .

      "$VENV/bin/python" -m PyInstaller --noconfirm --onedir --name workonward-read WorkOnwardRead.py

      mkdir -p "$CRAFT_PART_INSTALL/workonward-read"
      cp -r dist/workonward-read/* "$CRAFT_PART_INSTALL/workonward-read/"
      chmod +x "$CRAFT_PART_INSTALL/workonward-read/workonward-read"

      # -------------------------------
      # FONTS + FONTCONFIG
      # -------------------------------
      mkdir -p "$CRAFT_PART_INSTALL/fonts"

      printf '%s\n' \
        '<?xml version="1.0"?>' \
        '<!DOCTYPE fontconfig SYSTEM "fonts.dtd">' \
        '<fontconfig>' \
        '  <dir>/snap/workonward-read/current/usr/share/fonts</dir>' \
        '  <cachedir prefix="xdg">fontconfig</cachedir>' \
        '  <config>' \
        '    <rescan>' \
        '      <int>30</int>' \
        '    </rescan>' \
        '  </config>' \
        '</fontconfig>' \
        > "$CRAFT_PART_INSTALL/fonts/fonts.conf"

      # -------------------------------
      # LAUNCHER SCRIPT
      # -------------------------------
      mkdir -p "$CRAFT_PART_INSTALL/bin"

      printf '%s\n' \
        '#!/bin/sh' \
        'export FONTCONFIG_PATH="$SNAP/fonts"' \
        'export FONTCONFIG_FILE="$SNAP/fonts/fonts.conf"' \
        'export XDG_DATA_HOME="$SNAP/usr/share"' \
        'exec "$SNAP/workonward-read/workonward-read" "$@"' \
        > "$CRAFT_PART_INSTALL/bin/launcher"

      chmod +x "$CRAFT_PART_INSTALL/bin/launcher"

      # -------------------------------
      # DESKTOP FILE
      # -------------------------------
      mkdir -p "$CRAFT_PART_INSTALL/share/applications"

      printf '%s\n' \
        '[Desktop Entry]' \
        'Name=WorkOnward Read' \
        'GenericName=PDF Redaction Tool' \
        'Comment=Redact sensitive information in PDFs and images' \
        'Exec=workonward-read %f' \
        'Icon=${SNAP}/share/icons/workonward-read.svg' \
        'Terminal=false' \
        'Type=Application' \
        'Categories=Office;Utility;Graphics;' \
        'MimeType=application/pdf;image/png;image/jpeg;' \
        'StartupNotify=true' \
        'Keywords=pdf;redact;privacy;censor;black;bar;' \
        > "$CRAFT_PART_INSTALL/share/applications/workonward-read.desktop"

      mkdir -p "$CRAFT_PART_INSTALL/share/icons"
      cp WorkOnwardRead.svg "$CRAFT_PART_INSTALL/share/icons/workonward-read.svg" || true
      cp WorkOnwardRead.ico "$CRAFT_PART_INSTALL/share/icons/workonward-read.ico" || true

    override-prime: |
      craftctl default
      rm -f "$CRAFT_PRIME/usr/lib/libBLTlite"* || true
      rm -f "$CRAFT_PRIME/usr/lib/x86_64-linux-gnu/libXfixes.so.3"* || true
