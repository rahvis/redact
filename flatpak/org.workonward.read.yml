  - name: workonward-read
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} ./workonward-read --no-build-isolation
      - install -Dm644 org.workonward.read.desktop ${FLATPAK_DEST}/share/applications/org.workonward.read.desktop
      - install -Dm644 org.workonward.read.metainfo.xml ${FLATPAK_DEST}/share/metainfo/org.workonward.read.metainfo.xml
      - install -Dm644 org.workonward.read.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/org.workonward.read.svg
      - install -Dm644 workonward-read/LICENSE ${FLATPAK_DEST}/share/licenses/org.workonward.read/LICENSE
    sources:
      # Built from the LOCAL source tree (this checkout), not the upstream repo.
      - type: dir
        path: ..
        dest: workonward-read
        skip:
          - .git
          - .venv
          - dist
          - build
          - .flatpak-builder
      - type: file
        path: org.workonward.read.desktop
      - type: file
        path: org.workonward.read.metainfo.xml
      - type: file
        path: org.workonward.read.svg
