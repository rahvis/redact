  # with:
  #   pip download --dest wheels --only-binary :all: \
  #     --platform manylinux_2_28_x86_64 --python-version 3.12 \
  #     --implementation cp --abi cp312 --abi abi3 --abi none \
  #     pypdf cryptography pyhanko pdfminer.six python-docx pytesseract
  # Binary wheels (cffi, cryptography, charset-normalizer, lxml, pyyaml)
  # are manylinux x86_64 cp312/abi3 to match the GNOME 48 runtime Python
  # (same pattern as the Pillow wheel above). Modules are ordered so every
  # dependency installs before its dependents (pip verifies at install
  # time). Pillow (needed by pytesseract) is already vendored above.
  # ---------------------------------------------------------------------

