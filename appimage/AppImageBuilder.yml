# WorkOnward Read AppImage recipe — built from LOCAL source (this checkout),
# not a git clone of the upstream repository. Run from the repo root:
#     appimage-builder --recipe appimage/AppImageBuilder.yml
# WorkOnward Read is based on CoverUP by Björn Seipel (digidigital), GPL-3.0.
version: 1

AppDir:
  path: ./AppDir

  before_bundle:
    - |
      set -euo pipefail
      set -x

      # sichere Ausgabe ohne set -u crash
      echo "WORKDIR = $(pwd)"
      #echo "APPDIR = ${APPDIR:-<unset>}"
      export APPDIR="$(pwd)/AppDir"

      # Build from the LOCAL source tree (run this recipe from the repo root).
      # A pristine copy is staged into workonward-read-src/ so build
      # artifacts (venv, dist) do not pollute the checkout.
      if [ ! -d "workonward-read-src" ]; then
        mkdir -p workonward-read-src
        tar --exclude=./AppDir --exclude=./workonward-read-src --exclude=./.git \
            --exclude=./venv --exclude=./.venv --exclude=./dist --exclude=./build \
            -cf - . | tar -xf - -C workonward-read-src
      fi
      cd workonward-read-src

      # Create virtual environment and install dependencies
      python3 -m venv venv
      ./venv/bin/python -m pip install --upgrade pip setuptools wheel --disable-pip-version-check --no-cache-dir

      # Install PyInstaller and project dependencies
      ./venv/bin/python -m pip install "pyinstaller>=5.0.0" --no-cache-dir
      ./venv/bin/python -m pip install . --no-cache-dir

      # Build with PyInstaller in onedir mode
      ./venv/bin/python -m PyInstaller --noconfirm --onedir --name workonward-read WorkOnwardRead.py

      # Ensure AppDir exists and copy built files
      mkdir -p "$APPDIR/usr/bin"
      echo "Copying from $(pwd)/dist/workonward-read to $APPDIR/usr/bin"
      cp -r dist/workonward-read/* "$APPDIR/usr/bin/"
      chmod +x "$APPDIR/usr/bin/workonward-read" || true

      # Copy icons
      mkdir -p "$APPDIR/usr/share/icons/hicolor/scalable/apps"
      cp WorkOnwardRead.svg "$APPDIR/usr/share/icons/hicolor/scalable/apps/workonward-read.svg" || true

      # Copy fontconfig (best effort)
      mkdir -p "$APPDIR/etc/fonts"
      cp -r /etc/fonts/* "$APPDIR/etc/fonts/" || true

  app_info:
    id: org.workonward.read
    name: WorkOnward Read
    icon: workonward-read
    version: 0.5.1
    exec: usr/bin/workonward-read
    exec_args: $@

  apt:
    arch: amd64
    sources:
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ jammy main universe
        key_url: http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C

    include:
      - libx11-6
      - libxext6
      - libxrender1
      - libxcb1
      - libxau6
      - libxdmcp6
      - fontconfig
      - fonts-dejavu-core
      - fonts-dejavu-extra
      - fonts-noto-core
      - libtk8.6
      - libtcl8.6
      - libssl3
      - libffi8

    exclude:
      - humanity-icon-theme
      - hicolor-icon-theme
      - adwaita-icon-theme

  runtime:
    env:
      FONTCONFIG_PATH: '${APPDIR}/etc/fonts'
      XDG_DATA_DIRS: '${APPDIR}/usr/share:${XDG_DATA_DIRS}'
      TCL_LIBRARY: '${APPDIR}/usr/share/tcltk/tcl8.6'
      TK_LIBRARY: '${APPDIR}/usr/share/tcltk/tk8.6'

  files:
    include: []
    exclude:
      - usr/share/man
      - usr/share/doc
      - usr/share/doc-base

  test:
    fedora-30:
      image: appimagecrafters/tests-env:fedora-30
      command: ./AppRun --version
    debian-stable:
      image: appimagecrafters/tests-env:debian-stable
      command: ./AppRun --version
    ubuntu-xenial:
      image: appimagecrafters/tests-env:ubuntu-xenial
      command: ./AppRun --version

AppImage:
  arch: x86_64
  # update-information: gh-releases-zsync|rahvis|redact|latest|WorkOnwardRead-*x86_64.AppImage.zsync
