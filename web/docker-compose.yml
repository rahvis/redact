services:
  coverup-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: coverup-web
    container_name: coverup-web
    ports:
      - "8090:8080"
    restart: unless-stopped
    # Redaction runs entirely in RAM. tmpfs keeps any large-upload spillover
    # (Starlette spools multipart parts >1 MB) off the real disk.
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8080/api/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
